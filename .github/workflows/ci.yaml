name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [development, master]
  push:
    branches:
      - development
      - feature/**
    tags: 
      - '**'

jobs:
  determine-environment:
    uses: TokioFinal/tokio_reusable_workflows/.github/workflows/determine_environment.yaml@v2

  test:
    uses: TokioFinal/tokio_reusable_workflows/.github/workflows/test_python_app.yaml@v2

  trivy_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          format: 'table'
          exit-code: 1
          ignore-unfixed: false
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'
     
  build:
    needs: [ test, determine-environment ] 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Production
        if: ${{needs.determine-environment.outputs.selected-environment}} == 'production'
        uses: ./.github/workflows/build_production.yaml
      - name: Build Staging
        if: ${{needs.determine-environment.outputs.selected-environment}} == 'staging'
        uses: ./.github/workflows/build_staging.yaml
      - name: Build Development
        if: ${{needs.determine-environment.outputs.selected-environment}} == 'development'
        uses: ./.github/workflows/build_development.yaml
    